version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
      - deps
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "actions/*"
          - "gradle/*"
