name: CI (Reusable)

on:
  workflow_call:
    inputs:
      mod-name:
        description: 'Display name of the mod/plugin (PascalCase, e.g. DisableVillagerTrade)'
        required: true
        type: string
      mod-id:
        description: 'Mod ID (lowercase, e.g. disablevillagertrade) — used for log grep patterns'
        required: true
        type: string
      java-version:
        description: 'Java version to compile with'
        required: false
        type: string
        default: '21'
      run-bukkit:
        description: 'Build and test the Bukkit platform'
        required: false
        type: boolean
        default: true
      run-fabric:
        description: 'Build and test the Fabric platform'
        required: false
        type: boolean
        default: true
      run-forge:
        description: 'Build and test the Forge platform'
        required: false
        type: boolean
        default: true
      run-neoforge:
        description: 'Build and test the NeoForge platform'
        required: false
        type: boolean
        default: true

jobs:
  check-changes:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.changes.outputs.should_test }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 2

      - name: Check for code file changes
        id: changes
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          COMMIT_MSG="${COMMIT_MSG:-}"

          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]] || [[ "$COMMIT_MSG" == *"[ci skip]"* ]]; then
            echo "⏭️ Skipping due to [skip ci]"
            echo "should_test=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$COMMIT_MSG" == *"[force deploy]"* ]] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "✅ Force run"
            echo "should_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only "$PR_BASE_SHA" "$HEAD_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SHOULD_TEST="false"
          while IFS= read -r file; do
            if [[ "$file" == */src/main/java/* ]] || \
               [[ "$file" == */src/main/resources/* ]] || \
               [[ "$file" == */src/test/* ]] || \
               [[ "$file" == common/* ]] || \
               [[ "$file" == bukkit/* ]] || \
               [[ "$file" == fabric/* ]] || \
               [[ "$file" == forge/* ]] || \
               [[ "$file" == neoforge/* ]] || \
               [[ "$file" == "build.gradle.kts" ]] || \
               [[ "$file" == "settings.gradle.kts" ]] || \
               [[ "$file" == "gradle.properties" ]] || \
               [[ "$file" == "gradle/libs.versions.toml" ]] || \
               [[ "$file" == */build.gradle.kts ]]; then
              SHOULD_TEST="true"
              echo "✅ Code file changed: $file"
              break
            fi
          done <<< "$CHANGED_FILES"

          echo "should_test=$SHOULD_TEST" >> "$GITHUB_OUTPUT"
          echo "Should test: $SHOULD_TEST"

  # ─── Unit tests ──────────────────────────────────────────────────────────

  test-unit:
    name: 🧪 Unit Tests
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
      - name: Make gradlew executables
        run: |
          chmod +x gradlew
          if [ -f bukkit/gradlew ]; then chmod +x bukkit/gradlew; fi
      - name: Run common tests
        run: ./gradlew :common:test --no-daemon
      - name: Run bukkit tests
        if: inputs.run-bukkit
        working-directory: bukkit
        run: ./gradlew test --no-daemon
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: test-results
          path: '**/build/reports/tests/'

  # ─── Per-platform parallel builds ────────────────────────────────────────

  build-bukkit:
    name: 🪣 Build Bukkit
    needs: check-changes
    if: inputs.run-bukkit && needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
      - run: chmod +x bukkit/gradlew
      - working-directory: bukkit
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ${{ inputs.mod-name }}-Bukkit
          path: bukkit/build/libs/*.jar
          retention-days: 7

  build-fabric:
    name: 🧵 Build Fabric
    needs: check-changes
    if: inputs.run-fabric && needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
      - run: chmod +x fabric/gradlew
      - working-directory: fabric
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ${{ inputs.mod-name }}-Fabric
          path: fabric/build/libs/*.jar
          retention-days: 7

  build-forge:
    name: 🔥 Build Forge
    needs: check-changes
    if: inputs.run-forge && needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
      - run: chmod +x forge/gradlew
      - working-directory: forge
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ${{ inputs.mod-name }}-Forge
          path: forge/build/libs/*.jar
          retention-days: 7

  build-neoforge:
    name: ⚒️ Build NeoForge
    needs: check-changes
    if: inputs.run-neoforge && needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4
      - run: chmod +x neoforge/gradlew
      - working-directory: neoforge
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ${{ inputs.mod-name }}-NeoForge
          path: neoforge/build/libs/*.jar
          retention-days: 7

  # ─── Integration tests (PR and manual dispatch only) ─────────────────────
  # Each test starts as soon as its own platform build finishes.
  # Artifacts are reused from the build jobs above — no double build.

  test-bukkit:
    name: 🪣 Test Bukkit/Paper
    needs: build-bukkit
    if: |
      inputs.run-bukkit &&
      needs.build-bukkit.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ${{ inputs.mod-name }}-Bukkit
          path: bukkit-build

      - name: Download Paper server
        run: |
          mkdir -p test-server/plugins
          MC_VERSION=$(grep -E '^minecraft = "[0-9]' gradle/libs.versions.toml | cut -d'"' -f2)
          PAPER_BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds" | jq -r '.builds[-1].build')
          if [ -z "$PAPER_BUILD" ] || [ "$PAPER_BUILD" = "null" ]; then
            MC_VERSION=$(curl -s "https://api.papermc.io/v2/projects/paper" | jq -r '.versions[-1]')
            PAPER_BUILD=$(curl -s "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds" | jq -r '.builds[-1].build')
          fi
          curl -o test-server/paper.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${MC_VERSION}/builds/${PAPER_BUILD}/downloads/paper-${MC_VERSION}-${PAPER_BUILD}.jar"
          find bukkit-build -name "*.jar" ! -name "*-slim.jar" -exec cp {} test-server/plugins/ \;
          echo "eula=true" > test-server/eula.txt
          echo -e "online-mode=false\nspawn-protection=0\nmax-tick-time=-1" > test-server/server.properties

      - name: Start Paper server and verify plugin loads
        timeout-minutes: 5
        env:
          MOD_NAME: ${{ inputs.mod-name }}
          MOD_ID: ${{ inputs.mod-id }}
        run: |
          cd test-server
          java -Xmx1G -jar paper.jar --nogui &
          SERVER_PID=$!
          for _ in {1..120}; do
            if grep -q "Done" logs/latest.log 2>/dev/null; then echo "✅ Server started!"; break; fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then echo "❌ Server crashed!"; cat logs/latest.log; exit 1; fi
            sleep 1
          done
          if grep -qi "$MOD_NAME" logs/latest.log; then
            echo "✅ Plugin loaded successfully!"
          else
            echo "❌ Plugin failed to load!"; cat logs/latest.log; exit 1
          fi
          if grep -qiE "(ERROR|SEVERE).*$MOD_NAME" logs/latest.log; then echo "❌ Plugin has errors!"; exit 1; fi
          if grep -qi "Could not load.*$MOD_NAME\|failed to load.*$MOD_NAME" logs/latest.log; then echo "❌ Plugin failed to load!"; exit 1; fi
          kill $SERVER_PID 2>/dev/null || true
          echo "✅ Bukkit integration test passed!"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: paper-server-logs
          path: test-server/logs/

  test-fabric:
    name: 🧵 Test Fabric
    needs: build-fabric
    if: |
      inputs.run-fabric &&
      needs.build-fabric.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ${{ inputs.mod-name }}-Fabric
          path: fabric-build

      - name: Download Fabric server
        run: |
          mkdir -p test-server/mods
          MC_VERSION=$(grep -E '^minecraft = "[0-9]' gradle/libs.versions.toml | cut -d'"' -f2)
          curl -o fabric-installer.jar "https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.0.1/fabric-installer-1.0.1.jar"
          java -jar fabric-installer.jar server -mcversion "$MC_VERSION" -dir test-server -downloadMinecraft
          FABRIC_API_URL=$(curl -s "https://api.modrinth.com/v2/project/fabric-api/version?game_versions=%5B%22${MC_VERSION}%22%5D&loaders=%5B%22fabric%22%5D" | jq -r '.[0].files[0].url')
          if [ -n "$FABRIC_API_URL" ] && [ "$FABRIC_API_URL" != "null" ]; then
            curl -L -o test-server/mods/fabric-api.jar "$FABRIC_API_URL"
          fi
          find fabric-build -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" -exec cp {} test-server/mods/ \;
          echo "eula=true" > test-server/eula.txt
          echo -e "online-mode=false\nspawn-protection=0\nmax-tick-time=-1" > test-server/server.properties

      - name: Start Fabric server and verify mod loads
        timeout-minutes: 5
        env:
          MOD_ID: ${{ inputs.mod-id }}
        run: |
          cd test-server
          java -Xmx1G -jar fabric-server-launch.jar --nogui &
          SERVER_PID=$!
          for _ in {1..120}; do
            if grep -q "Done" logs/latest.log 2>/dev/null; then echo "✅ Server started!"; break; fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then echo "❌ Server crashed!"; cat logs/latest.log; exit 1; fi
            sleep 1
          done
          if grep -qiE "(ERROR|FATAL).*$MOD_ID" logs/latest.log; then echo "❌ Mod has errors!"; exit 1; fi
          kill $SERVER_PID 2>/dev/null || true
          echo "✅ Fabric integration test passed!"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: fabric-server-logs
          path: test-server/logs/

  test-forge:
    name: 🔥 Test Forge
    needs: build-forge
    if: |
      inputs.run-forge &&
      needs.build-forge.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ${{ inputs.mod-name }}-Forge
          path: forge-build

      - name: Cache Forge server installation
        id: forge-server-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/forge-server-base
          key: forge-server-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Download and install Forge server
        if: steps.forge-server-cache.outputs.cache-hit != 'true'
        run: |
          FORGE_VERSION=$(grep -E '^forge = "[0-9]' gradle/libs.versions.toml | cut -d'"' -f2)
          curl -f -o forge-installer.jar \
            "https://maven.minecraftforge.net/net/minecraftforge/forge/${FORGE_VERSION}/forge-${FORGE_VERSION}-installer.jar"
          mkdir -p ~/forge-server-base
          java -jar forge-installer.jar --installServer ~/forge-server-base

      - name: Setup test server
        run: |
          mkdir -p test-server/mods
          cp -r ~/forge-server-base/. test-server/
          find forge-build -name "*.jar" ! -name "*-sources.jar" ! -name "*-slim.jar" -exec cp {} test-server/mods/ \;
          echo "eula=true" > test-server/eula.txt
          echo -e "online-mode=false\nspawn-protection=0\nmax-tick-time=-1" > test-server/server.properties

      - name: Start Forge server and verify mod loads
        timeout-minutes: 8
        env:
          MOD_ID: ${{ inputs.mod-id }}
        run: |
          cd test-server
          if [ -f "run.sh" ]; then
            chmod +x run.sh && ./run.sh --nogui &
          elif [ -f "run.bat" ]; then
            JAVA_ARGS=$(grep "java" run.bat | sed 's/.*java/java/' | sed 's/%\*//g')
            eval "$JAVA_ARGS --nogui" &
          else
            FORGE_JAR=$(find . -maxdepth 1 -name "forge-*.jar" ! -name "*installer*" | head -1)
            if [ -n "$FORGE_JAR" ]; then
              java -Xmx2G -jar "$FORGE_JAR" --nogui &
            else
              java -Xmx2G @user_jvm_args.txt @libraries/net/minecraftforge/forge/*/unix_args.txt --nogui &
            fi
          fi
          SERVER_PID=$!
          for _ in {1..150}; do
            if grep -q "Done" logs/latest.log 2>/dev/null; then echo "✅ Server started!"; break; fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then echo "❌ Server crashed!"; cat logs/latest.log 2>/dev/null || cat logs/debug.log 2>/dev/null; exit 1; fi
            sleep 1
          done
          if grep -qiE "(ERROR|FATAL).*$MOD_ID" logs/latest.log 2>/dev/null; then echo "❌ Mod has errors!"; exit 1; fi
          kill $SERVER_PID 2>/dev/null || true
          echo "✅ Forge integration test passed!"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: forge-server-logs
          path: test-server/logs/

  test-neoforge:
    name: ⚒️ Test NeoForge
    needs: build-neoforge
    if: |
      inputs.run-neoforge &&
      needs.build-neoforge.result == 'success' &&
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ${{ inputs.mod-name }}-NeoForge
          path: neoforge-build

      - name: Cache NeoForge server installation
        id: neoforge-server-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/neoforge-server-base
          key: neoforge-server-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Download and install NeoForge server
        if: steps.neoforge-server-cache.outputs.cache-hit != 'true'
        run: |
          NEOFORGE_VERSION=$(grep '^neoforge = ' gradle/libs.versions.toml | cut -d'"' -f2)
          curl -f -o neoforge-installer.jar \
            "https://maven.neoforged.net/releases/net/neoforged/neoforge/${NEOFORGE_VERSION}/neoforge-${NEOFORGE_VERSION}-installer.jar"
          mkdir -p ~/neoforge-server-base
          java -jar neoforge-installer.jar --installServer ~/neoforge-server-base

      - name: Setup test server
        run: |
          mkdir -p test-server/mods
          cp -r ~/neoforge-server-base/. test-server/
          find neoforge-build -name "*.jar" ! -name "*-sources.jar" ! -name "*-slim.jar" -exec cp {} test-server/mods/ \;
          echo "eula=true" > test-server/eula.txt
          echo -e "online-mode=false\nspawn-protection=0\nmax-tick-time=-1" > test-server/server.properties

      - name: Start NeoForge server and verify mod loads
        timeout-minutes: 8
        env:
          MOD_ID: ${{ inputs.mod-id }}
        run: |
          cd test-server
          if [ -f "run.sh" ]; then
            chmod +x run.sh && ./run.sh --nogui &
          else
            java -Xmx2G @user_jvm_args.txt @libraries/net/neoforged/neoforge/*/unix_args.txt --nogui &
          fi
          SERVER_PID=$!
          for _ in {1..180}; do
            if grep -q "Done" logs/latest.log 2>/dev/null; then echo "✅ Server started!"; break; fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then echo "❌ Server crashed!"; cat logs/latest.log 2>/dev/null; exit 1; fi
            sleep 1
          done
          if grep -qiE "(ERROR|FATAL).*$MOD_ID" logs/latest.log 2>/dev/null; then echo "❌ Mod has errors!"; exit 1; fi
          kill $SERVER_PID 2>/dev/null || true
          echo "✅ NeoForge integration test passed!"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: neoforge-server-logs
          path: test-server/logs/

  # ─── Summary ─────────────────────────────────────────────────────────────

  summary:
    name: 📊 CI Summary
    needs: [check-changes, test-unit, build-bukkit, build-fabric, build-forge, build-neoforge, test-bukkit, test-fabric, test-forge, test-neoforge]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        env:
          RESULT_UNIT:       ${{ needs.test-unit.result }}
          RESULT_BUKKIT:     ${{ needs.build-bukkit.result }}
          RESULT_FABRIC:     ${{ needs.build-fabric.result }}
          RESULT_FORGE:      ${{ needs.build-forge.result }}
          RESULT_NEOFORGE:   ${{ needs.build-neoforge.result }}
          RESULT_T_BUKKIT:   ${{ needs.test-bukkit.result }}
          RESULT_T_FABRIC:   ${{ needs.test-fabric.result }}
          RESULT_T_FORGE:    ${{ needs.test-forge.result }}
          RESULT_T_NEOFORGE: ${{ needs.test-neoforge.result }}
          EVENT_NAME:        ${{ github.event_name }}
          GIT_REF:           ${{ github.ref }}
          SHOULD_TEST:       ${{ needs.check-changes.outputs.should_test }}
        run: |
          status() { case "$1" in success) echo "✅ Passed" ;; skipped) echo "⏭️ Skipped" ;; *) echo "❌ Failed ($1)" ;; esac; }

          {
            echo "## 🏗️ CI Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SHOULD_TEST" != "true" ]; then
            echo "⏭️ Skipped — no relevant code changes." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Unit Tests       | $(status "$RESULT_UNIT") |"
            echo "| Bukkit Build     | $(status "$RESULT_BUKKIT") |"
            echo "| Fabric Build     | $(status "$RESULT_FABRIC") |"
            echo "| Forge Build      | $(status "$RESULT_FORGE") |"
            echo "| NeoForge Build   | $(status "$RESULT_NEOFORGE") |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "workflow_dispatch" ] || ([ "$EVENT_NAME" = "push" ] && ([ "$GIT_REF" = "refs/heads/master" ] || [ "$GIT_REF" = "refs/heads/main" ] || [ "$GIT_REF" = "refs/heads/develop" ])); then
            {
              echo ""
              echo "### Integration Tests"
              echo "| Platform | Status |"
              echo "|----------|--------|"
              echo "| Bukkit/Paper | $(status "$RESULT_T_BUKKIT") |"
              echo "| Fabric       | $(status "$RESULT_T_FABRIC") |"
              echo "| Forge        | $(status "$RESULT_T_FORGE") |"
              echo "| NeoForge     | $(status "$RESULT_T_NEOFORGE") |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          {
            echo ""
            echo "> 📦 Build artifacts available in the Actions artifacts section."
          } >> "$GITHUB_STEP_SUMMARY"

          for result in "$RESULT_UNIT" "$RESULT_BUKKIT" "$RESULT_FABRIC" "$RESULT_FORGE" "$RESULT_NEOFORGE" \
                        "$RESULT_T_BUKKIT" "$RESULT_T_FABRIC" "$RESULT_T_FORGE" "$RESULT_T_NEOFORGE"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
