name: Self CD

on:
  workflow_run:
    workflows: ["Validate Workflows"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Compute Version & Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: ${LAST_TAG:-none}"

          if [ -z "$LAST_TAG" ]; then
            # First release ever — always publish as v1.0.0
            {
              echo "skip=false"
              echo "version=1.0.0"
              echo "tag=v1.0.0"
              echo "major=v1"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/v//' | cut -d. -f3)

          BUMP="none"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
              BUMP="major"
              break
            elif echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            elif echo "$line" | grep -qE '^(fix|perf|revert|refactor)(\(.+\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done < <(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")

          echo "Version bump: $BUMP"

          if [ "$BUMP" = "none" ]; then
            echo "No version-bumping commits found — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: v$NEW_VERSION"
          {
            echo "skip=false"
            echo "version=$NEW_VERSION"
            echo "tag=v$NEW_VERSION"
            echo "major=v$MAJOR"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        if: steps.version.outputs.skip != 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" | head -50)
          else
            NOTES=$(git log HEAD --pretty=format:"- %s" | head -50)
          fi
          # Escape for GitHub output (multiline)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🔧 mc-multiplatform-toolkit ${{ steps.version.outputs.tag }}"
          body: |
            ## What's Changed

            ${{ steps.notes.outputs.notes }}

            ---
            **Callers on `@main` get this automatically.**
            To pin to this release: use `@${{ steps.version.outputs.tag }}` or `@${{ steps.version.outputs.major }}` in your workflow `uses:` line.
          make_latest: true

      - name: Update major floating tag
        if: steps.version.outputs.skip != 'true'
        run: |
          MAJOR_TAG="${{ steps.version.outputs.major }}"
          git tag -f "$MAJOR_TAG" "${{ steps.version.outputs.tag }}^{}"
          git push origin "refs/tags/$MAJOR_TAG" --force
